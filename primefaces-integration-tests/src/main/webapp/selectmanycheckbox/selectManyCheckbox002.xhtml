<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="primefaces">

<f:view contentType="text/html;charset=UTF-8" encoding="UTF-8">
    <h:head>

    </h:head>

    <h:body>

        <h:form id="form">
            <p:messages id="msgs" showDetail="true">
                <p:autoUpdate />
            </p:messages>

            <p:selectManyCheckbox id="selectmanycheckbox" value="#{selectManyCheckbox002.selectedDrivers}" layout="pageDirection">
                <f:selectItem itemLabel="Lewis" itemValue="Lewis"/>
                <f:selectItem itemLabel="Max" itemValue="Max"/>
                <f:selectItem itemLabel="Charles" itemValue="Charles" itemDisabled="true"/>
                <f:selectItem itemLabel="Lando" itemValue="Lando"/>
            </p:selectManyCheckbox>

            <p:commandButton id="button" update="@form" value="Submit" action="#{selectManyCheckbox002.submit}"/>
        </h:form>

    </h:body>
</f:view>

</html>
