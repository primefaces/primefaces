<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="primefaces">

    <f:view contentType="text/html;charset=UTF-8" encoding="UTF-8">
        <h:head/>

        <h:body>
            <h:form id="form">
                <p:messages id="messages" showDetail="true"/>

                <h:outputText id="counter" value="#{commandLink001.counter}"/>

                <p:commandLink id="linkAjax" value="Ajax Submit"
                               update="messages counter"
                               action="#{commandLink001.submit()}"/>

                <p:commandLink id="linkNonAjax" value="Non-Ajax Submit"
                               ajax="false"
                               action="#{commandLink001.submit()}"/>
            </h:form>
        </h:body>
    </f:view>

</html>
