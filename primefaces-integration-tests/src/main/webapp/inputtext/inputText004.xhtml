<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="primefaces">

<f:view contentType="text/html;charset=UTF-8" encoding="UTF-8">
    <h:head>

    </h:head>

    <h:body>

        <h:form id="form">
            <p:outputLabel for="@next" value="Readonly"/>
            <p:inputText id="readonly" value="#{inputText004.readonlyValue}" readonly="true"/>
            <br/>

            <p:outputLabel for="@next" value="Placeholder"/>
            <p:inputText id="placeholder" value="#{inputText004.placeholderValue}" placeholder="Type here..."/>
            <br/>

            <p:outputLabel for="@next" value="Passthrough"/>
            <p:inputText id="passthrough" value="#{inputText004.passthroughValue}"
                         title="My Tooltip" size="30" autocomplete="off"/>

            <p:commandButton id="button" update="@form" value="Submit"/>
        </h:form>

    </h:body>
</f:view>

</html>
