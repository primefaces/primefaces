<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="primefaces">

<f:view contentType="text/html;charset=UTF-8" encoding="UTF-8">
    <h:head>

    </h:head>

    <h:body>

        <h:form id="form">
            <p:outputLabel for="@next" value="Blur"/>
            <p:inputText id="blurInput" value="#{inputText006.value}">
                <p:ajax event="blur" process="@this" listener="#{inputText006.onBlur}" update="form:eventlog"/>
            </p:inputText>
            <br/>

            <p:outputLabel for="@next" value="Keyup"/>
            <p:inputText id="keyupInput" value="#{inputText006.value}">
                <p:ajax event="keyup" process="@this" listener="#{inputText006.onKeyup}" update="form:eventlog"/>
            </p:inputText>
            <br/>

            <p:outputLabel for="@next" value="Change"/>
            <p:inputText id="changeInput" value="#{inputText006.value}">
                <p:ajax event="change" process="@this" listener="#{inputText006.onChange}" update="form:eventlog"/>
            </p:inputText>
            <br/>

            Last event: <h:outputText id="eventlog" value="#{inputText006.lastEvent}"/>
        </h:form>

    </h:body>
</f:view>

</html>
