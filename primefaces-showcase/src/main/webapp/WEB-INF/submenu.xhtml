<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:mycomposites="jakarta.faces.composite/composite"
                xmlns:p="primefaces">

    <ui:fragment rendered="#{not empty appSubMenu.subMenuItems
                            or not empty documentationLink
                            or not empty widgetLink
                            or not empty primefacesClientApiLink
                            or not empty tagName
                            or tagLibrary.isTagVdlAvailable(documentationLink)}">
    <div class="layout-submenu">

        <ui:fragment rendered="#{not empty tagName}">
            <p:sidebar widgetVar="currentTagLib" style="width: 1300px; overflow: auto;" appendTo="@(body)" modal="true" position="right" blockScroll="true">
                <h:form>
                    <h4>p:#{tagName}</h4>
                    <mycomposites:componentDocumentation value="#{cdkController.tags[tagName]}" />
                </h:form>
            </p:sidebar>
        </ui:fragment>

        <!-- RESOURCES -->
        <ui:fragment rendered="#{not empty documentationLink or not empty widgetLink or not empty primefacesClientApiLink or tagLibrary.isTagVdlAvailable(documentationLink)}">
            <div class="submenu-section-title">RESOURCES</div>

            <ui:fragment rendered="#{not empty tagName}">
                <a class="submenu-resource-link" onclick="PF('currentTagLib').show(); return;" target="_blank" rel="noopener noreferrer">
                    <i class="pi pi-external-link"></i>
                    <span>TagLib</span>
                </a>
            </ui:fragment>

            <ui:fragment rendered="#{not empty documentationLink}">
                <a class="submenu-resource-link" href="https://primefaces.github.io/primefaces/16_0_0/##{documentationLink}" target="_blank" rel="noopener noreferrer">
                    <i class="pi pi-external-link"></i>
                    <span>Server API</span>
                </a>
            </ui:fragment>

            <ui:fragment rendered="#{not empty widgetLink}">
                <a class="submenu-resource-link" href="https://primefaces.github.io/primefaces/jsdocs/classes/src_PrimeFaces.PrimeFaces.widget.#{widgetLink}.html#{not empty widgetLinkHash ? '#'.concat(widgetLinkHash) : ''}" target="_blank" rel="noopener noreferrer">
                    <i class="pi pi-external-link"></i>
                    <span>Client API</span>
                </a>
            </ui:fragment>

            <ui:fragment rendered="#{not empty primefacesClientApiLink}">
                <a class="submenu-resource-link" href="https://primefaces.github.io/primefaces/jsdocs/#{primefacesClientApiLink}" target="_blank" rel="noopener noreferrer">
                    <i class="pi pi-external-link"></i>
                    <span>Client API</span>
                </a>
            </ui:fragment>

            <ui:fragment rendered="#{tagLibrary.isTagVdlAvailable(documentationLink)}">
                <a class="submenu-resource-link" href="https://primefaces.github.io/primefaces/vdldoc/primefaces/#{tagLibrary.getTagVdlComponent(documentationLink)}.html" target="_blank" rel="noopener noreferrer">
                    <i class="pi pi-external-link"></i>
                    <span>Tag VDL</span>
                </a>
            </ui:fragment>
        </ui:fragment>

        <!-- ON THIS PAGE -->
        <ui:fragment rendered="#{not empty appSubMenu.subMenuItems}">
            <div class="submenu-section-title">ON THIS PAGE</div>
            <ui:repeat value="#{appSubMenu.subMenuItems}" var="sub">
                <h:link outcome="#{sub.url}" styleClass="#{sub eq appSubMenu.currentMenuItem ? 'active' : ''}">
                    #{sub.label}
                </h:link>
            </ui:repeat>
        </ui:fragment>



    </div>
    </ui:fragment>

</ui:composition>
