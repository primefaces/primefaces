<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      xmlns:composite="jakarta.faces.composite">

    <composite:interface>
        <composite:attribute name="value" type="org.primefaces.showcase.util.CDKController$TagInfo"/>
    </composite:interface>

    <composite:implementation>

        <div id="#{cc.clientId}" class="taglib-component">

            #{cc.attrs.value.tag.description}
            <br />
            <br />
            <p:tabView>
                <p:tab title="Properties">
                    <p:dataTable value="#{cc.attrs.value.properties}" var="prop" stripedRows="true">
                        <p:column headerText="Name" style="width:200px;" field="name" />
                        <p:column headerText="Type" style="width:300px;" field="type.name" />
                        <p:column headerText="Required" style="width:50px;">
                            #{prop.required}
                        </p:column>
                        <p:column headerText="Default" style="width:100px;">
                            #{cdkController.resolveDefaultValue(prop)}
                        </p:column>
                        <p:column headerText="Description" field="description" />
                    </p:dataTable>
                </p:tab>

                <p:tab title="Facets">
                    <p:dataTable value="#{cc.attrs.value.facets}" var="facet" stripedRows="true">
                        <p:column headerText="Name" style="width:200px;">
                            #{facet.name}
                        </p:column>
                        <p:column headerText="Description">
                            #{facet.description}
                        </p:column>
                    </p:dataTable>
                </p:tab>

                <p:tab title="Events"
                       rendered="#{not empty cc.attrs.value.clientBehaviorsEvents}">

                    <p:dataTable value="#{cc.attrs.value.clientBehaviorsEvents}"
                                 var="prop"
                                 stripedRows="true">
                        <p:column headerText="Name" style="width:200px;">
                            #{prop.name}
                        </p:column>
                        <p:column headerText="Type" style="width:300px;">
                            #{prop.type.name}
                        </p:column>
                        <p:column headerText="Default" style="width:50px;">
                            #{prop.defaultEvent}
                        </p:column>
                        <p:column headerText="Description">
                            #{prop.description}
                        </p:column>
                    </p:dataTable>

                </p:tab>
            </p:tabView>

        </div>

    </composite:implementation>
</html>
