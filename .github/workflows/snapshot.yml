name: Publish Snapshot

on:
  workflow_run:
    workflows: [Continuous Integration]
    types: [completed]
    branches: [master]

jobs:
  publish-snapshot:
    runs-on: ubuntu-latest
    if: >
      github.repository == 'primefaces/primefaces' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'master'
    name: Publish Snapshot
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
      - name: Check SNAPSHOT version
        id: version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "Project version: $VERSION"
          if [[ "$VERSION" == *-SNAPSHOT ]]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Skipping snapshot publish: version is not a SNAPSHOT"
          fi
      - name: Build for deployment
        if: steps.version.outputs.publish == 'true'
        run: mvn -Prelease --batch-mode --show-version
      - name: Publish snapshot
        if: steps.version.outputs.publish == 'true'
        env:
          JRELEASER_NEXUS2_SNAPSHOT_DEPLOY_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          JRELEASER_NEXUS2_SNAPSHOT_DEPLOY_PASSWORD: ${{ secrets.SONATYPE_TOKEN }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY }}
        run: mvn -N jreleaser:deploy --batch-mode --show-version
