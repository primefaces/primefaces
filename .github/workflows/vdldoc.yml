name: Generate VDL Documentation

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]

env:
  JAVA_VERSION: '11'
  JAVA_DISTRO: 'temurin'
  BRANCH: 'master'

jobs:
  generate-vdldoc:
    runs-on: ubuntu-latest
    if: github.repository == 'primefaces/primefaces'
    name: Generate VDL Documentation
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRO }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Generate VDL Documentation
        run: mvn -B -T1C --no-transfer-progress clean install -pl primefaces -am -DskipTests -Dcheckstyle.skip

      - name: Copy VDL Documentation
        run: |
          rsync -av primefaces/target/site/vdldoc/ docs/vdldoc/

      - name: Check for changes
        id: check-changes
        run: |
          if [ -n "$(git status --porcelain docs/vdldoc/)" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit and push changes
        if: steps.check-changes.outputs.changes == 'true'
        run: |
          git add docs/vdldoc/
          git diff --cached --quiet || git commit -m "Update VDL documentation [skip ci]"
          git push
